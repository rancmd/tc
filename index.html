<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="theme-color" content="#f5f5f0" />
  <title>Task Crusher</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="confetti-canvas"></canvas>
  <div id="crush-flash"><div id="crush-flash-text"></div></div>

  <!-- ── TASK LIST OVERLAY (full screen) ── -->
  <div id="list-overlay" class="hidden">
    <div id="list-panel">
      <div id="list-header">
        <div id="list-title">All Tasks</div>
        <button id="list-close" onclick="closeList()">✕</button>
      </div>
      <div id="list-filters">
        <button class="filter-btn active" data-filter="active" onclick="setFilter(this,'active')">Active</button>
        <button class="filter-btn" data-filter="done" onclick="setFilter(this,'done')">Done</button>
        <button class="filter-btn" data-filter="all" onclick="setFilter(this,'all')">All</button>
      </div>
      <!-- Sort bar (active only) -->
      <div id="list-sort">
        <span class="sort-label">Sort:</span>
        <button class="sort-btn active" data-sort="manual" onclick="setSort(this,'manual')">Manual</button>
        <button class="sort-btn" data-sort="priority" onclick="setSort(this,'priority')">Priority</button>
        <button class="sort-btn" data-sort="time" onclick="setSort(this,'time')">Time</button>
      </div>
      <!-- Clear done button -->
      <div id="clear-done-wrap">
        <button id="clear-done-btn" onclick="clearAllDone()" style="display:none">Clear completed</button>
      </div>
      <div id="list-items"></div>
    </div>
  </div>

  <!-- ── APP ── -->
  <div id="app">
    <div id="top-bar">
      <div id="logo">TASK <span>CRUSHER</span></div>
      <div id="task-count" onclick="openList()"></div>
    </div>

    <div id="stage">
      <!-- Task card — click to crush -->
      <div id="task-card" onclick="handleCardClick()">
        <div id="task-text"></div>
        <div id="crush-hover-label">✊ Crush it!</div>
      </div>

      <!-- Empty state -->
      <div id="empty-card">
        <div id="empty-prompt"></div>
      </div>

      <!-- Quick actions: dropdowns -->
      <div id="quick-actions"></div>

      <!-- Subtasks -->
      <div id="subtask-list"></div>

      <!-- Queue hint with nav arrows -->
      <div id="queue-hint">
        <button id="nav-prev" class="nav-btn" onclick="navTask(-1)" title="Previous task">↑</button>
        <span id="queue-label"></span>
        <button id="nav-next" class="nav-btn" onclick="navTask(1)" title="Next task">↓</button>
      </div>

      <div id="empty-done-msg">🎉 <strong>Queue empty.</strong> You crushed everything.</div>
    </div>

    <!-- FAB -->
    <button id="fab" onclick="openAddScreen()" title="Add task">+</button>
  </div>

  <!-- ── ADD TASK SCREEN — full frame, overlays the app ── -->
  <div id="add-screen" class="hidden">
    <div id="add-top-bar">
      <div id="add-logo">TASK <span>CRUSHER</span></div>
      <button id="add-screen-close" onclick="closeAddScreen()">✕</button>
    </div>
    <div id="add-stage">
      <!-- Input styled like the task card area -->
      <div id="add-input-wrap">
        <textarea id="add-input" placeholder="What needs to be done?" rows="3"></textarea>
        <button id="add-submit-btn" onclick="submitTask()" title="Add task">✓</button>
      </div>
      <!-- Tag dropdowns below — same layout as quick actions -->
      <div id="add-tag-actions">
        <!-- Time dropdown -->
        <div class="qa-dropdown" id="add-dd-time">
          <button class="qa-pill" id="add-time-pill" onclick="toggleAddDropdown('add-dd-time')">
            Time ▾
          </button>
          <div class="qa-dropdown-menu" id="add-dd-time-menu">
            <button class="qa-menu-item" onclick="addSetTime('5 min')">5 min</button>
            <button class="qa-menu-item" onclick="addSetTime('15 min')">15 min</button>
            <button class="qa-menu-item" onclick="addSetTime('30 min')">30 min</button>
          </div>
        </div>
        <!-- Priority dropdown -->
        <div class="qa-dropdown" id="add-dd-prio">
          <button class="qa-pill" id="add-prio-pill" onclick="toggleAddDropdown('add-dd-prio')">
            Priority ▾
          </button>
          <div class="qa-dropdown-menu" id="add-dd-prio-menu">
            <button class="qa-menu-item" onclick="addSetPrio('Urgent')">Urgent</button>
            <button class="qa-menu-item" onclick="addSetPrio('Easy')">Easy</button>
            <button class="qa-menu-item" onclick="addSetPrio('Fun')">Fun</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SPLIT MODAL ── -->
  <div id="split-modal" class="hidden">
    <div id="split-panel">
      <div id="split-header-row">
        <div id="split-title">Break it down</div>
        <button id="split-close" onclick="closeSplitModal()">✕</button>
      </div>
      <div id="split-parent-label"></div>
      <div id="split-inputs-wrap"></div>
      <button class="split-add-step" onclick="addSplitInput()">+ Add step</button>
      <button id="split-confirm" onclick="confirmSplit()">Done — split it</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
